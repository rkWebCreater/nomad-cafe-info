name: Deploy to GitHub Pages
on:
  push:
    branches: [ main ] # 💡あなたのメインブランチ名が「master」なら master に書き換えてください
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx nuxt generate
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public
      - id: deployment
        uses: actions/deploy-pages@v4
